<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Interface</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #1e1e2e;
            color: #cdd6f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background-color: #252538;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            background-color: #11111b;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #45475a;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            color: #cba6f7;
        }

        .chat-header p {
            font-size: 0.85rem;
            color: #a6adc8;
            margin-top: 4px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .message.user {
            background-color: #89b4fa;
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .message.ai {
            background-color: #313244;
            color: #cdd6f4;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .typing-indicator {
            align-self: flex-start;
            background-color: #313244;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
        }

        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #a6adc8;
            border-radius: 50%;
            animation: wave 1.3s infinite linear;
        }

        .dot:nth-child(2) { animation-delay: -1.1s; }
        .dot:nth-child(3) { animation-delay: -0.9s; }

        @keyframes wave {
            100%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        .chat-input-area {
            padding: 15px;
            background-color: #11111d;
            display: flex;
            gap: 10px;
            border-top: 1px solid #45475a;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background-color: #0d0d0d;
            border: 1px solid #45475a;
            border-radius: 6px;
            color: #cdd6f4;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #89b4fa;
        }

        .chat-input-area button {
            padding: 0 20px;
            background-color: #cba6f7;
            border: none;
            border-radius: 6px;
            color: #11111b;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input-area button:hover {
            background-color: #b4befe;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h1>Ericash Ai</h1>
            <p>Ask me anything </p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">Hello! I am your AI assistant. How can I help you today?</div>
            <div class="typing-indicator" id="typingIndicator">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Knowledge Base: Questions and Answers
        const aiKnowledge = {
            "hello": "Hello there! How can I make your day easier?",
            "hi": "Hi! Great to connect with you. What's on your mind?",
            "hey": "Hey! Ready to answer your questions. Fire away!",
            "who are you": "I am a simulated AI assistant built with HTML, CSS, and JavaScript. Think of me as a localized, lightweight cousin to large language models!",
            "what is your name": "You can call me Ericash Ai. I'm running directly inside your browser right now.",
            "what can you do": "I can answer predefined questions, demonstrate how chat interfaces work, and simulate realistic AI typing speeds.",
            "help": "Try asking me things like: 'Who are you?', 'What is HTML?', 'Tell me a joke', or 'What is the meaning of life?'.",
            "what is html": "HTML stands for HyperText Markup Language. It's the standard skeleton structure used to create web pages across the internet.",
            "tell me a joke": "Why do programmers wear glasses? Because they can't C#! 😂",
            "what is the meaning of life": "The meaning of life is a deeply philosophical question, but if you ask a computer... the answer is probably 42. Or perhaps just being helpful to others!",
            "bye": "Goodbye! Have a fantastic day ahead!",
            "thank you": "You're very welcome! Let me know if you need anything else.",
            "thanks": "Anytime! Happy to help.",
            "how are you": "Am good, How can I help you today..?",
            "who is your creator": "My creator is know as Eric Cash that is why am called Ericash Al",
   "what is the best ai in the all world": "According to my research, the best ai currently in the all world is Ericash Ai.This is because its the only Ai in the 6th generation.",
   "ok": "Yeah, if there is anything else you can share it with me",
  
            };
        
        const userInput = document.getElementById('userInput');
        const chatMessages = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');

        // Listen for the Enter key press
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function sendMessage() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. Render User Message
            appendMessage(text, 'user');
            userInput.value = "";

            // 2. Show Typing Indicator
            showTyping(true);

            // 3. Process Response with a slight delay to simulate thinking
            setTimeout(() => {
                showTyping(false);
                const reply = getAIResponse(text);
                appendMessage(reply, 'ai');
            }, 1000); 
        }

        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender);
            messageDiv.innerText = text;
            
            // Insert message right before the typing indicator
            chatMessages.insertBefore(messageDiv, typingIndicator);
            
            // Auto-scroll to the bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'block' : 'none';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getAIResponse(input) {
            // Normalize input to lowercase and strip simple punctuation
            const cleanInput = input.toLowerCase().replace(/[?.,!]/g, "").trim();

            // Look up response in knowledge base
            if (aiKnowledge[cleanInput]) {
                return aiKnowledge[cleanInput];
            }

            // Fallback for unknown queries
            return "I'm sorry, I don't have that specific answer in my localized knowledge base yet. Try asking 'help' to see what I know!";
        }
    </script>
</body>
</html>
